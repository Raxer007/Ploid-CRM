databases:
  - name: ploid-crm-db
    plan: free

services:
  - type: web
    name: ploid-crm
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: HOST_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ploid-crm-db
          property: connectionString
